<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobHunter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">

      <!-- Header -->
      <div class="popup-header">
        <div class="popup-logo">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="2" width="7" height="7" rx="2" fill="#6366f1"/>
            <rect x="11" y="2" width="7" height="7" rx="2" fill="#6366f1" opacity="0.5"/>
            <rect x="2" y="11" width="7" height="7" rx="2" fill="#6366f1" opacity="0.5"/>
            <rect x="11" y="11" width="7" height="7" rx="2" fill="#6366f1" opacity="0.25"/>
          </svg>
          <span class="popup-brand">JobHunter</span>
        </div>
        <div id="statusBadge" class="status-badge status-idle">
          <span class="status-dot"></span>
          <span id="statusText">Idle</span>
        </div>
      </div>

      <!-- Job context bar (shows when applicationId detected) -->
      <div id="jobBar" class="job-bar hidden">
        <div class="job-bar-icon">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
            <rect x="2" y="4" width="12" height="10" rx="1.5"/>
            <path stroke-linecap="round" d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/>
          </svg>
        </div>
        <div class="job-bar-info">
          <span id="jobCompany" class="job-company">—</span>
          <span id="jobRole" class="job-role">—</span>
        </div>
        <span id="jobStatus" class="job-status-pill">prepared</span>
      </div>

      <!-- Config section -->
      <div class="section">
        <div class="section-title">Connection</div>
        <div class="field-group">
          <div class="field">
            <label class="field-label">API URL</label>
            <input id="baseUrl" class="field-input" placeholder="http://localhost:3000" />
          </div>
          <div class="field">
            <label class="field-label">Token</label>
            <input id="token" class="field-input" type="password" placeholder="jhx_…" autocomplete="off" />
          </div>
        </div>
        <div class="field">
          <label class="field-label">Application ID <span class="field-hint">(auto-detected)</span></label>
          <input id="applicationId" class="field-input" placeholder="cmo…" />
        </div>
      </div>

      <!-- Options section -->
      <div class="section options-row">
        <label class="toggle-field">
          <input id="refreshMaterials" type="checkbox" checked />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">Refresh resume &amp; answers</span>
        </label>
        <label class="toggle-field">
          <input id="autoSubmit" type="checkbox" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">Auto-submit after fill</span>
        </label>
      </div>

      <!-- Progress steps (shown during autofill) -->
      <div id="stepsBox" class="steps-box hidden">
        <div class="step" id="step-tailor">
          <span class="step-icon step-pending">○</span>
          <span class="step-label">Tailoring resume</span>
        </div>
        <div class="step" id="step-fill">
          <span class="step-icon step-pending">○</span>
          <span class="step-label">Filling form fields</span>
        </div>
        <div class="step" id="step-submit">
          <span class="step-icon step-pending">○</span>
          <span class="step-label">Submitting application</span>
        </div>
      </div>

      <!-- Status message -->
      <div id="statusBox" class="status-box hidden">
        <p id="statusMsg" class="status-msg"></p>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button id="saveBtn" type="button" class="btn btn-secondary">Save</button>
        <button id="testBtn" type="button" class="btn btn-secondary">Test</button>
        <button id="fillBtn" type="button" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8h10M9 4l4 4-4 4"/>
          </svg>
          Autofill
        </button>
      </div>

    </div>
    <script src="popup.js"></script>
  </body>
</html>
