services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5:7b"]
    restart: "no"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobhunter}
      POSTGRES_USER: ${POSTGRES_USER:-jobhunter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobhunter}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobhunter} -d ${POSTGRES_DB:-jobhunter}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: ${DATABASE_URL:-postgresql://jobhunter:jobhunter@postgres:5432/jobhunter}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-replace-me}
      JOBHUNTER_ENABLE_DEMO_SEED: ${JOBHUNTER_ENABLE_DEMO_SEED:-false}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      JOBHUNTER_EXTERNAL_AUTOFILL_ENABLED: ${JOBHUNTER_EXTERNAL_AUTOFILL_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      JOBHUNTER_GREENHOUSE_BOARDS: ${JOBHUNTER_GREENHOUSE_BOARDS:-}
      JOBHUNTER_ASHBY_BOARDS: ${JOBHUNTER_ASHBY_BOARDS:-}
      JOBHUNTER_LEVER_SITES: ${JOBHUNTER_LEVER_SITES:-}
      JOBHUNTER_WORKABLE_COMPANIES: ${JOBHUNTER_WORKABLE_COMPANIES:-}
      JOBHUNTER_REMOTEOK_TAGS: ${JOBHUNTER_REMOTEOK_TAGS:-engineer,typescript,python,react,golang,devops}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
      ADZUNA_COUNTRY: ${ADZUNA_COUNTRY:-us}
    command: >
      sh -lc "npm install &&
      npm run db:generate &&
      npm run dev --workspace @jobhunter/web"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/apps/web/.next
      - web_playwright_cache:/ms-playwright

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://jobhunter:jobhunter@postgres:5432/jobhunter}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      JOBHUNTER_FIT_THRESHOLD: ${JOBHUNTER_FIT_THRESHOLD:-70}
      JOBHUNTER_AUTO_APPLY_ENABLED: ${JOBHUNTER_AUTO_APPLY_ENABLED:-false}
      JOBHUNTER_AUTO_APPLY_DRY_RUN: ${JOBHUNTER_AUTO_APPLY_DRY_RUN:-true}
      JOBHUNTER_EXTERNAL_AUTOFILL_ENABLED: ${JOBHUNTER_EXTERNAL_AUTOFILL_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      JOBHUNTER_GREENHOUSE_BOARDS: ${JOBHUNTER_GREENHOUSE_BOARDS:-}
      JOBHUNTER_ASHBY_BOARDS: ${JOBHUNTER_ASHBY_BOARDS:-}
      JOBHUNTER_LEVER_SITES: ${JOBHUNTER_LEVER_SITES:-}
      JOBHUNTER_WORKABLE_COMPANIES: ${JOBHUNTER_WORKABLE_COMPANIES:-}
      JOBHUNTER_REMOTEOK_TAGS: ${JOBHUNTER_REMOTEOK_TAGS:-engineer,typescript,python,react,golang,devops}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
      ADZUNA_COUNTRY: ${ADZUNA_COUNTRY:-us}
    command: >
      sh -lc "npm install &&
      npm run db:generate &&
      npm run dev --workspace @jobhunter/worker"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
      - worker_playwright_cache:/ms-playwright

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://jobhunter:jobhunter@postgres:5432/jobhunter}
      JOBHUNTER_ENABLE_DEMO_SEED: ${JOBHUNTER_ENABLE_DEMO_SEED:-false}
    command: >
      sh -lc "npm install &&
      npm run db:generate &&
      npm run db:deploy"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - migrate_node_modules:/app/node_modules

volumes:
  postgres_data:
  ollama_data:
  migrate_node_modules:
  web_node_modules:
  web_next_cache:
  web_playwright_cache:
  worker_node_modules:
  worker_playwright_cache:
